body:
  text: 開天傳信記小說家類二異聞之屬提要臣等謹案開天傳信記一卷唐鄭綮撰綮字藴武滎陽人登進士第纍官右散騎常侍好以詩謡託諷昭宗意其有所藴蓄擢為禮部侍郎同中書門下平章事所謂歇後鄭五作宰相時事可知者即其人也舊唐書本傳稱綮嘗厯監察殿中倉戶二員外金刑右司三郎而是書原本首署其官為吏部員外郎本傳顧未之及或史文有所脫漏歟書中皆記開元天寶故事凡三十二條目序稱簿領之暇搜求遺逸期於必信故以傳信為名其紀明皇戲遊城南王琚延過其家謀誅韋氏一條据唐書琚傳乃琚選補主簿過謝太子乘機進說以除太平公主並無先過琚家之事司馬光作通鑑亦不從是書惟新唐書兼採之然韋氏稱制時琚方以王同皎黨亡命江都安得復卜居韋杜綮所紀恐非事實宜為通鑑所不取又如華隂見嶽神夢遊月宫羅公逺𨼆形葉法善符籙諸事亦語涉神怪未能盡出於雅馴然行世既久諸書言唐事者多沿用之故録以備小說之一種焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:81466d90e82d2f4cea17465aa5225edaaf4e85c21dfe10ee83ff75a56d250a66
